<div class="split-screen">
  <div class="left-pane">
    <img
      src="assets/banner.png"
      alt="Banner"
      class="left-image"
    />
  </div>

  <div class="right-pane">
    <div class="login-box">
      <img src="assets/bus.git.jpg" alt="Logo" class="brand-logo" />

      <h2 class="login-title">Login to Your Account</h2>
      <p class="subtitle">Continue booking your favorite rides</p>

      <!-- Loader shown when login is clicked -->
      <div *ngIf="loading && !showForm" class="loader-container">
        <img
          
          alt="Loading..."
          class="bus-loader"
        />
        <p style="margin-top: 1rem;">Logging in... Please wait</p>
      </div>

      <!-- Actual form hidden during loading -->
      <form *ngIf="showForm" (ngSubmit)="login()">
        <div class="input-group">
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="input-group">
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" [disabled]="loading">Login</button>

        <p *ngIf="errorMsg" class="error-msg">⚠️ {{ errorMsg }}</p>
      </form>

      <p class="register-link" *ngIf="showForm">
        Don't have an account?
        <a routerLink="/register">Register now</a>
      </p>
    </div>
  </div>
</div>
